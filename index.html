<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silent King - Prototyp Ultimate v3.0 (Podzielony)</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Informacja dla środowisk bez serwera HTTP -->
    <div id="server-warning" style="display: none; position: fixed; top: 0; left: 0; right: 0; background: var(--danger); color: white; padding: 10px; text-align: center; z-index: 1000; font-weight: bold;">
        <i data-lucide="alert-triangle" style="vertical-align: middle; margin-right: 8px;"></i> Uwaga: Aby ekrany działały poprawnie, musisz uruchomić projekt przez lokalny serwer HTTP.
    </div>

    <div class="role-switcher">
        <button id="btn-client" class="role-btn active" onclick="switchRole('client')">Klient</button>
        <button id="btn-staff" class="role-btn" onclick="switchRole('staff')">Obsługa</button>
    </div>

    <div class="phone-frame">
        <div class="status-bar">
            <span>23:05</span>
            <div style="display: flex; gap: 8px; align-items: center;">
                <i data-lucide="signal" style="width: 16px; height: 16px;"></i>
                <i data-lucide="battery-full" style="width: 18px; height: 18px;"></i>
            </div>
        </div>
        
        <!-- Główny kontener, do którego JS wstrzykuje ekrany z folderu screens/ -->
        <div id="screen-container" style="display: flex; flex: 1; flex-direction: column; overflow: hidden;">
        </div>

        <!-- Kontener na powiadomienia in-app -->
        <div id="toast-container"></div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
